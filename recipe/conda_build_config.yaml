# https://github.com/conda-forge/conda-forge-pinning-feedstock/blob/main/recipe/conda_build_config.yaml

c_stdlib_version:  # [osx and x86_64]
  - '10.15'        # [osx and x86_64]

# Pin pybind11_abi to version 4 (pybind11 2.x) to avoid pybind11 3.0.x
# which requires python_add_library not available with scikit-build-core
pybind11_abi:
  - '4'

rerun_version:
  - '0.23'
