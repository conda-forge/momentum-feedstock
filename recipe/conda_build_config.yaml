# https://github.com/conda-forge/conda-forge-pinning-feedstock/blob/main/recipe/conda_build_config.yaml

# CUDA configuration

# CUDA configuration with zip_keys - LINUX and WINDOWS ONLY.
# macOS uses the global config entirely. Windows uses default compiler
# versions, so only Linux carries explicit compiler/stdlib versions here.
cuda_compiler_version:  # [linux or win]
  - None              # [linux]
  - '12.9'            # [linux]
  - None              # [win]
  - '12.9'            # [win]

c_compiler_version:  # [linux]
  - '13'              # [linux]
  - '13'              # [linux]

cxx_compiler_version:  # [linux]
  - '13'              # [linux]
  - '13'              # [linux]

c_stdlib_version:  # [linux]
  - '2.17'            # [linux]
  - '2.17'            # [linux]

fortran_compiler_version:  # [linux]
  - '13'              # [linux]
  - '13'              # [linux]
